name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set release context
        run: |
          APP_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          echo "APP_VERSION=${APP_VERSION}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "${GITHUB_ENV}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            EXPECTED_TAG="v${APP_VERSION}"
            if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${APP_VERSION}" >&2
              exit 1
            fi
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Validate signing secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          for secret_name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_CONTENT; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/copytrack-release.keychain-db"
          CERTIFICATE_PATH="${RUNNER_TEMP}/copytrack-release.p12"

          echo -n "${APPLE_CERTIFICATE}" | base64 -D > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          CERT_ID=$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep "Developer ID Application" | head -n 1 | sed -E 's/.*"(.+)".*/\1/')

          if [[ -z "${CERT_ID}" ]]; then
            echo "Developer ID Application certificate was not found in the temporary keychain." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=${CERT_ID}" >> "${GITHUB_ENV}"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY_PATH=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Run verification suite
        run: npm run check

      - name: Build signed and notarized bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Collect release assets
        run: |
          VERSION="${APP_VERSION}"
          BUNDLE_ROOT="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_PATH="${BUNDLE_ROOT}/macos/CopyTrack.app"
          DMG_PATH=$(find "${BUNDLE_ROOT}/dmg" -maxdepth 1 -name 'CopyTrack_*.dmg' | head -n 1)
          ZIP_PATH="${RUNNER_TEMP}/CopyTrack_${VERSION}_aarch64.app.zip"
          SHA_PATH="${RUNNER_TEMP}/CopyTrack_${VERSION}_SHA256.txt"

          if [[ ! -d "${APP_PATH}" || -z "${DMG_PATH}" ]]; then
            echo "Expected release artifacts were not found." >&2
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"
          shasum -a 256 "${DMG_PATH}" "${ZIP_PATH}" > "${SHA_PATH}"

          echo "APP_PATH=${APP_PATH}" >> "${GITHUB_ENV}"
          echo "DMG_PATH=${DMG_PATH}" >> "${GITHUB_ENV}"
          echo "ZIP_PATH=${ZIP_PATH}" >> "${GITHUB_ENV}"
          echo "SHA_PATH=${SHA_PATH}" >> "${GITHUB_ENV}"

      - name: Validate signed bundle
        run: |
          chmod +x scripts/verify-macos-release.sh
          scripts/verify-macos-release.sh "${APP_PATH}"
          scripts/verify-macos-release.sh "${DMG_PATH}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: copytrack-macos-${{ env.APP_VERSION }}
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
          if-no-files-found: error

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          NOTES_FILE="docs/releases/${APP_VERSION}.md"
          OUTPUT="${RUNNER_TEMP}/release-notes.md"

          if [[ -f "${NOTES_FILE}" ]]; then
            cp "${NOTES_FILE}" "${OUTPUT}"
          else
            {
              echo "# CopyTrack v${APP_VERSION}"
              echo
              echo "- Signed and notarized macOS release"
              echo "- Apple Silicon build"
            } > "${OUTPUT}"
          fi

          echo "RELEASE_NOTES_PATH=${OUTPUT}" >> "${GITHUB_ENV}"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
            ${{ env.SHA_PATH }}
